<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appli — Job Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
<div class="app">

    <header>
        <div class="logo">
            <div class="logo-icon">✦</div>
            Appli
        </div>
        <span class="badge" id="badge">— applications</span>
    </header>

    <!-- toolbar, table, modals etc -->
    <!-- keep ALL your existing HTML exactly the same here -->
    <div class="toolbar">
        <div class="toolbar-left">
            <button class="btn btn-primary" id="addBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                Add Application
            </button>
            <select class="sort-select" id="sortSelect">
                <option value="newest">Sort: Newest</option>
                <option value="oldest">Sort: Oldest</option>
                <option value="company">Sort: Company A–Z</option>
            </select>
        </div>
        <span id="loadingTxt" style="font-size:12px;color:var(--text3);display:none;">Loading…</span>
    </div>

    <div class="bulk-bar" id="bulkBar">
        <span id="bulkCount" style="font-size:13px;color:var(--text2);">0 selected</span>
        <button class="btn btn-danger" id="deleteBtn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6" />
                <path d="M19 6l-1 14H6L5 6" />
                <path d="M10 11v6M14 11v6" />
                <path d="M9 6V4h6v2" />
            </svg>
            Delete Selected
        </button>
        <button class="btn btn-ghost" id="cancelSelBtn">Cancel</button>
    </div>

    <div class="table-wrap">
        <table id="mainTable" style="display:none;">
            <colgroup>
                <col class="c-chk" />
                <col class="c-date" />
                <col class="c-titl" />
                <col class="c-comp" />
                <col class="c-desc" />
                <col class="c-url" />
                <col class="c-res" />
            </colgroup>
            <thead>
                <tr>
                    <th><input type="checkbox" id="selAll" /></th>
                    <th>Date</th>
                    <th>Job Title</th>
                    <th>Company</th>
                    <th>Description</th>
                    <th>URL</th>
                    <th>Resume</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
        <div class="empty" id="emptyState" style="display:none;">
            <div style="font-size:48px;margin-bottom:16px;opacity:0.4;">📋</div>
            <h3>No applications yet</h3>
            <p>Start tracking your job search.</p>
            <button class="btn btn-primary" id="addBtn2">Add Application</button>
        </div>
    </div>
</div>

<!-- Add Modal -->
<div class="overlay" id="addOverlay">
    <div class="modal">
        <div class="modal-head">
            <div class="modal-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4f7cff" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="3" />
                    <line x1="12" y1="8" x2="12" y2="16" />
                    <line x1="8" y1="12" x2="16" y2="12" />
                </svg>
                New Application
            </div>
            <button class="close-btn" id="closeAdd">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-grid">
                <div class="field">
                    <label>Job Title *</label>
                    <input type="text" id="f_title" placeholder="e.g. Senior Engineer" />
                </div>
                <div class="field">
                    <label>Company *</label>
                    <input type="text" id="f_company" placeholder="e.g. Acme Corp" />
                </div>
                <div class="field">
                    <label>Date Applied</label>
                    <input type="datetime-local" id="f_date" />
                </div>
                <div class="field">
                    <label>Job URL</label>
                    <input type="url" id="f_url" placeholder="https://..." />
                </div>
                <div class="field full">
                    <label>Job Description</label>
                    <textarea id="f_desc" placeholder="Paste or summarize the job description…" rows="3"></textarea>
                </div>
                <div class="field full">
                    <label>Resume (PDF)</label>
                    <div class="file-drop" id="fileDrop">
                        <input type="file" id="f_resume" accept=".pdf" />
                        <div style="font-size:22px;margin-bottom:6px;">📄</div>
                        <div style="font-size:13px;color:var(--text2);">Drop PDF here or <span
                                style="color:var(--accent);font-weight:500;">browse</span></div>
                    </div>
                    <div class="file-chosen" id="fileChosen">
                        <span>📄</span><span id="fileName"></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-foot">
            <button class="btn btn-ghost" id="cancelAdd">Cancel</button>
            <button class="btn btn-primary" id="submitBtn">Add Application</button>
        </div>
    </div>
</div>

<div class="overlay" id="descOverlay">
    <div class="modal">
        <div class="modal-head">
            <div class="modal-title">Job Description</div>
            <button class="close-btn" id="closeDesc">✕</button>
        </div>
        <div class="modal-body">
            <p id="descText" style="color:var(--text2);font-size:14px;line-height:1.7;white-space:pre-wrap;"></p>
        </div>
    </div>
</div>

<!-- PDF Modal -->
<div class="overlay" id="pdfOverlay">
    <div class="modal wide">
        <div class="modal-head">
            <div class="modal-title">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#4f7cff" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                </svg>
                <span id="pdfTitle">Resume</span>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <a id="pdfDownload" class="btn btn-ghost" style="font-size:12px;padding:6px 12px;text-decoration:none;"
                    download>Download</a>
                <button class="close-btn" id="closePdf">✕</button>
            </div>
        </div>
        <div class="modal-body no-pad">
            <iframe id="pdfFrame" class="pdf-frame" src="" title="Resume"></iframe>
        </div>
    </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script src="js/app.js" defer></script>
</body>
</html>
